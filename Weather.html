<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input type="text" id="city" placeholder="Enter City">
    <button id="search">Search</button>

    <h2 id="cityName"></h2>
    <p id="temp"></p>

    


    <script>
        const apik = "393c24cc0b0303b4749deb1c7db3bcf7" ;

        const btn = document.querySelector("#search")
        btn.addEventListener("click" , getWeather)

        async function getWeather(){
            const city = document.querySelector("#city").value
            // const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apik}`
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apik}&units=metric`  //to get in degree C by default its in kelvin

            const res = await fetch(url);
            const data = await res.json();

            console.log(data);

            if(data.cod == 404){
                alert("City Not Found")
                return;
            }
            else if(data.cod == 401){
                alert("Invalid Api key")
                return;
            }

            document.querySelector("#cityName").innerText = data.name;
            document.querySelector("#temp").innerText = data.main.temp + "°C"    //alt + 0176

        }

    </script>
</body>
</html>
